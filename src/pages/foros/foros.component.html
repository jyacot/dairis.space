<div class="container">
  @if ((foro$ | async); as foro) {
    <div class="foro-container">

      <header class="foro-header">
        <a class="back-link" href="/">← {{'BACK' | translate}}</a>
        <p class="foro-epigraph">{{'FOROS_QUOTE' | translate}}</p>
        <h1 class="foro-title">{{foro.title}}</h1>
      </header>

      @for (slider of foro.sliders; track slider; let i = $index) {
        <div class="sliders">
          <div class="card">
            <div class="images">
              @for (image of slider.images; track image) {
                <div class="image" [ngStyle]="{'background-image': 'url(' + image + ')'}">
                </div>
              }
            </div>
            <app-slider [audios]="slider.audiosUrl"></app-slider>
          </div>
        </div>
      }

    </div>
  } @else {
    <div class="not-found">
      <p>{{'FORO_NOT_FOUND' | translate}}</p>
      <a href="/">← {{'BACK' | translate}}</a>
    </div>
  }
</div>
